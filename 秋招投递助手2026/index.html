<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026秋招投递助手</title>
<style>
:root{--bg:#f8f9fa;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--blue:#2563eb;--blue-bg:#eff6ff;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--border:#e5e7eb;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
nav h1{font-size:20px;font-weight:700}
nav .stats{display:flex;gap:16px;font-size:14px;color:var(--muted)}
.container{max-width:1200px;margin:0 auto;padding:20px}
.section-title{font-size:22px;font-weight:700;margin:24px 0 12px}
/* Search & Filters */
.search-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.search-bar input{flex:1;min-width:200px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--card);transition:all .15s}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card.urgent{border-left:3px solid var(--red)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-header h3{font-size:17px;font-weight:600}
.industry-tag{font-size:12px;padding:2px 8px;border-radius:12px;background:var(--blue-bg);color:var(--blue);white-space:nowrap}
.deadline{font-size:13px;margin-bottom:6px}
.deadline.urgent{color:var(--red);font-weight:600}.deadline.warn{color:var(--orange)}.deadline.ok{color:var(--muted)}
.desc{font-size:14px;color:var(--muted);margin-bottom:8px}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tag-blue{padding:2px 8px;border-radius:4px;background:#dbeafe;color:#1e40af;font-size:12px}
.tag-red{padding:2px 8px;border-radius:4px;background:#fee2e2;color:#991b1b;font-size:12px}
.link{display:inline-block;padding:6px 14px;background:var(--blue);color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:500;transition:background .15s}
.link:hover{background:#1d4ed8}
.no-results{text-align:center;padding:40px;color:var(--muted);display:none}
/* Tracker */
.tracker{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-top:24px}
.tracker h3{margin-bottom:12px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.add-row input,.add-row select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.add-row button{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);font-weight:600;color:var(--muted)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
.status-badge{padding:2px 8px;border-radius:4px;font-size:12px}
.s-投递{background:#fef3c7;color:#92400e}.s-笔试{background:#dbeafe;color:#1e40af}.s-面试{background:#ede9fe;color:#6b21a8}.s-Offer{background:#d1fae5;color:#065f46}
.btn-sm{padding:4px 10px;border:none;border-radius:4px;font-size:12px;cursor:pointer}
.btn-del{background:none;color:var(--red)}.btn-export{background:var(--blue);color:#fff;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;margin-top:12px}
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}.add-row{flex-direction:column}}
</style>
</head>
<body>

<nav>
  <h1>🎯 秋招助手 2026</h1>
  <div class="stats">
    <span>📋 <b id="company-total">0</b> 家公司</span>
    <span>⏰ <b id="urgent-count" style="color:var(--red)">0</b> 即将截止</span>
    <span>📝 已投 <b id="my-app-count">0</b></span>
  </div>
</nav>

<div class="container">

<div class="section-title">📊 公司列表</div>
<div class="search-bar">
  <input type="text" id="search-input" placeholder="搜索公司名或行业..." oninput="renderCompanies()">
</div>
<div class="filter-chips" id="filter-chips"></div>
<div class="card-grid" id="company-cards"></div>
<div class="no-results" id="no-results">没有匹配的公司 😅</div>

<div class="tracker" id="tracker-section">
  <h3>📝 我的投递记录</h3>
  <div class="add-row">
    <input type="text" id="t-company" placeholder="公司名" style="width:130px">
    <input type="text" id="t-position" placeholder="岗位" style="width:130px">
    <input type="date" id="t-date">
    <select id="t-status">
      <option value="已投递">已投递</option><option value="笔试中">笔试中</option><option value="面试中">面试中</option><option value="Offer">Offer</option>
    </select>
    <input type="text" id="t-note" placeholder="备注" style="width:100px">
    <button onclick="addApp()">+ 添加</button>
  </div>
  <table>
    <thead><tr><th>公司</th><th>岗位</th><th>日期</th><th>状态</th><th>备注</th><th></th></tr></thead>
    <tbody id="tracker-body"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">暂无记录，上方添加 ✨</td></tr></tbody>
  </table>
  <button class="btn-export" onclick="exportData()">📥 导出CSV</button>
</div>

</div>

<footer>数据更新于 2026-06-01 · 本地存储，数据仅保存在你的浏览器</footer>

<script>
// ═══ 公司数据 ═══
var CAMPUS_DATA = [{"name":"字节跳动","industry":"互联网","tags":["研发+23%","5000+Offer"],"url":"https://jobs.bytedance.com/campus","desc":"8月4日开启，研发岗需求暴增","deadline":"2026-09-15","source":"官网","referral":""},{"name":"阿里巴巴","industry":"互联网","tags":["7000+Offer","AI岗>60%"],"url":"https://campus.alibaba.com","desc":"8月5日启动，15个业务集团齐招","deadline":"2026-09-20","source":"官网","referral":""},{"name":"腾讯","industry":"互联网","tags":["技术+产品"],"url":"https://join.qq.com/","desc":"常规校招+阅文集团同步","deadline":"2026-09-25","source":"官网","referral":""},{"name":"京东","industry":"互联网+零售","tags":["3.5万岗位","零售/科技"],"url":"https://campus.jd.com/","desc":"7月28日启动，岗位量大管饱","deadline":"2026-08-30","source":"官网","referral":""},{"name":"美团","industry":"互联网","tags":["6000人","技术>1/3"],"url":"https://hr.meituan.com/web/campus","desc":"技术+运营+食杂零售管培生","deadline":"2026-09-15","source":"官网","referral":""},{"name":"百度","industry":"互联网","tags":["提前批7.20","AI优先"],"url":"https://talent.baidu.com/","desc":"提前批7.20开启，网申至6月底","deadline":"2026-06-30","source":"官网","referral":""},{"name":"小红书","industry":"互联网","tags":["北上广深杭"],"url":"https://job.xiaohongshu.com/campus","desc":"内容社区增长期","deadline":"2026-09-30","source":"官网","referral":""},{"name":"快手","industry":"互联网","tags":["北京为主"],"url":"https://campus.kuaishou.cn/","desc":"短视频赛道持续扩招","deadline":"2026-09-30","source":"官网","referral":""},{"name":"小米","industry":"硬件+互联网","tags":["全国多地"],"url":"https://hr.xiaomi.com/campus","desc":"手机+汽车+IoT全链","deadline":"2026-09-15","source":"官网","referral":""},{"name":"网易","industry":"互联网","tags":["游戏+音乐+教育"],"url":"https://campus.163.com/","desc":"多业务线同步招聘","deadline":"2026-09-20","source":"官网","referral":""},{"name":"拼多多","industry":"电商","tags":["上海","增长快"],"url":"https://careers.pinduoduo.com/","desc":"电商新贵，运营+供应链","deadline":"2026-09-30","source":"官网","referral":""},{"name":"蔚来","industry":"新能源","tags":["汽车+智能化"],"url":"https://campus.nio.com/","desc":"新能源车企，岗位多元","deadline":"2026-10-15","source":"官网","referral":""},{"name":"Shopee","industry":"电商","tags":["深圳","东南亚"],"url":"https://app.mokahr.com/campus_apply/shopee/2962/","desc":"跨境电商赛道","deadline":"2026-09-30","source":"官网","referral":""},{"name":"米哈游","industry":"游戏","tags":["上海/深圳"],"url":"https://campus.mihoyo.com/","desc":"游戏行业顶流","deadline":"2026-09-15","source":"官网","referral":""},{"name":"哔哩哔哩","industry":"互联网","tags":["北上渝"],"url":"https://jobs.bilibili.com/","desc":"Z世代社区","deadline":"2026-09-30","source":"官网","referral":""},{"name":"vivo","industry":"硬件","tags":["多地"],"url":"https://hr.vivo.com/","desc":"手机+IoT","deadline":"2026-09-30","source":"官网","referral":""},{"name":"OPPO","industry":"硬件","tags":["10城"],"url":"https://career.oppo.com/","desc":"手机+芯片+IoT","deadline":"2026-09-30","source":"官网","referral":""},{"name":"英特尔","industry":"半导体","tags":["京沪蓉"],"url":"https://jobs.intel.com/","desc":"芯片巨头","deadline":"2026-10-31","source":"官网","referral":""},{"name":"华为","industry":"硬件+通信","tags":["全球"],"url":"https://career.huawei.com/","desc":"通信+终端+云+车BU","deadline":"2026-09-30","source":"官网","referral":""},{"name":"比亚迪","industry":"新能源","tags":["汽车+电池"],"url":"https://job.byd.com/portal/mobile/school-home","desc":"全球新能源龙头","deadline":"2026-10-31","source":"官网","referral":""},{"name":"SHEIN","industry":"电商+零售","tags":["广州/南京","快时尚"],"url":"https://careers.shein.cn/Students-&-Graduates","desc":"跨境电商独角兽","deadline":"2026-10-31","source":"官网","referral":""},{"name":"顺丰","industry":"物流","tags":["全国","管培生"],"url":"https://campus.sf-express.com/","desc":"物流巨头校招","deadline":"2026-10-31","source":"官网","referral":""},{"name":"雀巢","industry":"快消","tags":["全国","管培生"],"url":"https://www.nestlecareers.cn/campus","desc":"食品快消龙头","deadline":"2026-10-31","source":"官网","referral":""},{"name":"理想汽车","industry":"新能源","tags":["北京/常州"],"url":"https://www.lixiang.com/employ/campus.html","desc":"造车新势力","deadline":"2026-10-15","source":"官网","referral":""},{"name":"名创优品","industry":"零售","tags":["广州","全球化"],"url":"https://miniso.zhiye.com/campus","desc":"全球零售品牌","deadline":"2026-10-31","source":"官网","referral":""},{"name":"盒马","industry":"零售+互联网","tags":["上海/杭州","新零售"],"url":"https://hire.freshippo.com/campus/home?lang=zh","desc":"阿里系新零售","deadline":"2026-10-31","source":"官网","referral":""},{"name":"携程","industry":"互联网+旅游","tags":["上海"],"url":"https://campus.ctrip.com/","desc":"OTA龙头","deadline":"2026-10-31","source":"官网","referral":""},{"name":"荣耀","industry":"硬件","tags":["全国","营销管培生"],"url":"https://www.honor.com/cn/career","desc":"手机品牌校招","deadline":"2026-10-31","source":"官网","referral":""},{"name":"滴滴","industry":"互联网","tags":["北京/杭州"],"url":"https://campus.didiglobal.com/","desc":"出行平台","deadline":"2026-10-31","source":"官网","referral":""},{"name":"大疆","industry":"硬件","tags":["深圳","机器人"],"url":"https://we.dji.com/zh-CN/campus","desc":"无人机+影像","deadline":"2026-09-15","source":"官网","referral":""}];

// ═══ 投递记录 (localStorage) ═══
var apps = JSON.parse(localStorage.getItem('campus_apps') || '[]');
var nextId = apps.length ? Math.max.apply(null, apps.map(function(a){return a.id})) + 1 : 1;

function saveApps(){ localStorage.setItem('campus_apps', JSON.stringify(apps)); }

function addApp(){
  var c = document.getElementById('t-company').value.trim();
  var p = document.getElementById('t-position').value.trim();
  if(!c||!p) return alert('请填公司名和岗位');
  apps.push({id:nextId++, company:c, position:p, date:document.getElementById('t-date').value||'未填写', status:document.getElementById('t-status').value, note:document.getElementById('t-note').value.trim()});
  saveApps(); renderTracker(); ['t-company','t-position','t-note'].forEach(function(id){document.getElementById(id).value='';});
}
function deleteApp(id){ apps = apps.filter(function(a){return a.id!==id}); saveApps(); renderTracker(); }
function renderTracker(){
  var tb = document.getElementById('tracker-body');
  tb.innerHTML = apps.length ? apps.map(function(a){
    var sc = 's-' + a.status.replace(/中/g,'').replace(/已/g,'');
    return '<tr><td><strong>'+a.company+'</strong></td><td>'+a.position+'</td><td>'+a.date+'</td><td><span class="status-badge '+sc+'">'+a.status+'</span></td><td style="font-size:13px;color:var(--muted)">'+(a.note||'-')+'</td><td><button class="btn-sm btn-del" onclick="deleteApp('+a.id+')">删除</button></td></tr>';
  }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">暂无记录</td></tr>';
  document.getElementById('my-app-count').textContent = apps.length;
}

// ═══ 公司渲染 ═══
var NOW = new Date(), DAY_MS = 86400000, URGENT = 7, WARN = 21;
function dd(d){ if(!d) return null; return Math.ceil((new Date(d+'T00:00:00+08:00') - NOW) / DAY_MS); }
function dc(d){ if(d===null) return 'ok'; if(d<=URGENT) return d<0?'urgent':'urgent'; if(d<=WARN) return 'warn'; return 'ok'; }
function dl(d){ if(d===null) return ''; if(d<0) return '已截止 '+Math.abs(d)+' 天'; if(d===0) return '今天截止！'; if(d===1) return '明天截止！'; if(d<=URGENT) return '⏰ '+d+' 天后截止'; if(d<=WARN) return '还有 '+d+' 天'; return d+' 天后截止'; }

function renderCompanies(){
  var s = document.getElementById('search-input').value.toLowerCase();
  var active = document.querySelector('.chip.active');
  var filter = active ? active.dataset.filter : 'all';
  var companies = CAMPUS_DATA;
  if(filter !== 'all') companies = companies.filter(function(c){ return c.industry.indexOf(filter) >= 0; });
  if(s) companies = companies.filter(function(c){ return c.name.toLowerCase().indexOf(s) >= 0 || c.industry.toLowerCase().indexOf(s) >= 0 || c.desc.toLowerCase().indexOf(s) >= 0; });
  document.getElementById('no-results').style.display = companies.length ? 'none' : 'block';
  document.getElementById('company-cards').innerHTML = companies.map(function(c){
    var d = dd(c.deadline), cls = dc(d), label = dl(d), urgent = (d!==null && d<=URGENT && d>=0);
    return '<div class="card'+(urgent?' urgent':'')+'"><div class="card-header"><h3>'+c.name+'</h3><span class="industry-tag">'+c.industry+'</span></div>'+(c.deadline?'<div class="deadline '+cls+'">📅 '+c.deadline+' · '+label+'</div>':'')+'<div class="desc">'+c.desc+'</div>'+(c.referral?'<div style="font-size:13px;color:var(--green);margin-bottom:4px">🎫 内推码：'+c.referral+'</div>':'')+'<div class="tags">'+c.tags.map(function(t){return '<span class="'+(cls==='urgent'?'tag-red':'tag-blue')+'">'+t+'</span>';}).join('')+'</div><a href="'+c.url+'" target="_blank" class="link">投递入口 →</a></div>';
  }).join('');
}

function renderFilters(){
  var industries = [];
  CAMPUS_DATA.forEach(function(c){ if(industries.indexOf(c.industry) < 0) industries.push(c.industry); });
  document.getElementById('filter-chips').innerHTML = '<span class="chip active" data-filter="all" onclick="setFilter(\'all\',this)">全部</span>' + industries.map(function(i){ return '<span class="chip" data-filter="'+i+'" onclick="setFilter(\''+i+'\',this)">'+i+'</span>'; }).join('');
}
function setFilter(f, el){ document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');}); el.classList.add('active'); renderCompanies(); }

function updateCountdown(){
  document.getElementById('company-total').textContent = CAMPUS_DATA.length;
  var urgent = CAMPUS_DATA.filter(function(c){ var d = dd(c.deadline); return d!==null && d<=URGENT && d>=0; });
  document.getElementById('urgent-count').textContent = urgent.length;
}

function exportData(){
  var csv = '\uFEFF公司,岗位,投递日期,状态,备注\n' + apps.map(function(a){ return a.company+','+a.position+','+a.date+','+a.status+','+a.note; }).join('\n');
  var b = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var u = URL.createObjectURL(b);
  var a = document.createElement('a'); a.href = u; a.download = '秋招投递记录.csv'; a.click();
}

// Init
renderFilters(); renderCompanies(); updateCountdown(); renderTracker();
</script>

</body>
</html>
