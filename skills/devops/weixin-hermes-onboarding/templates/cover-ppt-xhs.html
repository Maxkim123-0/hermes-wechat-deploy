<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=800">
<style>*{margin:0;padding:0;box-sizing:border-box}body{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Noto Sans CJK',sans-serif;background:#fff5f5;color:#333}
.bar{width:100%;height:6px;background:#ff6b6b}.emoji{font-size:72px;margin-bottom:10px}
.title{font-size:56px;font-weight:900;margin:30px 0 20px}.sub{font-size:26px;color:#666;margin-bottom:40px}
.badges{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.badge{padding:8px 20px;border-radius:20px;font-size:18px;background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1)}
.line{width:200px;height:4px;background:#ff6b6b;margin:10px auto}
.emoji-list{font-size:22px;color:#888;margin-top:10px;text-align:center;line-height:2}
.tag{font-size:18px;color:#aaa;margin-top:80px}</style></head>
<body>
<div class="bar"></div><div class="emoji">📊</div>
<div class="title">AI 做 PPT</div>
<div class="sub">室友靠这个拿了优秀毕设</div>
<div class="badges"><span class="badge">✨ 自动缩论文</span><span class="badge">📈 生成图表</span><span class="badge">🎤 写备注</span></div>
<div class="line"></div>
<div class="emoji-list">📝 毕业答辩 · 💼 述职汇报 · 🚀 商业计划书</div>
<div class="tag">长按截图 → 扫码看教程</div>
</body></html>
