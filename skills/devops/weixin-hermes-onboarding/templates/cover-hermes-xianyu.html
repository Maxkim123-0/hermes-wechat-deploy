<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=800">
<style>*{margin:0;padding:0;box-sizing:border-box}body{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Noto Sans CJK',sans-serif;background:#0a0a1a;color:#00ff88}
