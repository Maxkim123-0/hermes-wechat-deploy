<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=800">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Noto Sans CJK',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#e0e0e0}
.bar{width:100%;height:6px;background:#e94560}.emoji{font-size:72px;margin-bottom:10px}
.title{font-size:64px;font-weight:900;margin:30px 0 20px}.sub{font-size:24px;color:#ccc;margin-bottom:40px}
.badges{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.badge{padding:8px 20px;border-radius:20px;font-size:18px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
.line{width:200px;height:4px;background:#e94560;margin:10px auto}
.tag{font-size:18px;color:#888;margin-top:100px}
</style></head>
<body>
<div class="bar"></div><div class="emoji">📊</div>
<div class="title">PPT 代做</div>
<div class="sub">AI辅助 · 极速出稿 · 毕业答辩/述职/商业计划书</div>
<div class="badges"><span class="badge">⚡ 24h出稿</span><span class="badge">🎨 不撞款</span><span class="badge">🔄 包修改</span></div>
<div class="line"></div><div class="tag">HERMES AI · 你的智能助手</div>
</body></html>
