<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "SimSun", "宋体", serif; font-size: 11px; line-height: 1.7; color: #222; max-width: 800px; margin: 0 auto; padding: 0; }
  .header { text-align: center; padding: 24px 0 16px 0; border-bottom: 2px solid #1a1a1a; margin-bottom: 16px; }
  .header h1 { font-family: "SimHei", "黑体", sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 4px; }
  .header .info { font-size: 10.5px; color: #555; margin-top: 6px; }
  .header .info span { margin: 0 10px; }
  .section { margin-bottom: 14px; }
  .section-title { font-family: "SimHei", "黑体", sans-serif; font-size: 13px; font-weight: 700; border-bottom: 1px solid #333; padding-bottom: 3px; margin-bottom: 8px; letter-spacing: 2px; }
  .item { margin-bottom: 8px; }
  .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .item-title { font-weight: 700; font-size: 11px; }
  .item-sub { color: #555; font-size: 10px; }
  .item-date { font-size: 10px; color: #666; white-space: nowrap; }
  .item-body { font-size: 10.5px; color: #333; padding-left: 0; }
  .item-body li { list-style: none; position: relative; padding-left: 14px; margin-bottom: 1px; }
  .item-body li::before { content: "•"; position: absolute; left: 0; color: #333; }
  .two-col { display: flex; gap: 24px; }
  .two-col > div { flex: 1; }
  .cert-grid { font-size: 10.5px; }
  .cert-grid span { margin-right: 14px; white-space: nowrap; }
  @media print { body { padding: 24px 32px; } }
</style>
</head>
<body>
<!-- Replace placeholders below -->
<div class="header">
  <h1>{{NAME}}</h1>
  <div class="info"><span>{{PHONE}}</span><span>{{EMAIL}}</span><span>{{CITY}}</span></div>
</div>
<div class="section">
  <div class="section-title">求职意向</div>
  <div style="font-size:11px;">{{TARGET_ROLES}}</div>
  <div style="font-size:10.5px; color:#555; margin-top:2px;">到岗时间：{{START_DATE}} ｜ 期望城市：{{CITY}} ｜ 期望薪资：{{SALARY}}</div>
</div>
<!-- Add education, experience, projects, etc. sections following the pattern -->
</body>
</html>
