<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "SimSun","宋体",serif; font-size: 11px; line-height: 1.7; color: #222; max-width: 780px; margin: 0 auto; padding: 32px 36px; }
  .personal { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 20px; }
  .personal .photo { width: 90px; height: 120px; border: 1px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; background: #f5f5f5; }
  .personal .photo img { width: 100%; height: 100%; object-fit: cover; }
  .personal .info { flex: 1; }
  .personal .info .name { font-family: "SimHei","黑体",sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; margin-bottom: 8px; }
  .personal .info .row { font-size: 11px; color: #444; margin-bottom: 3px; }
  .personal .info .row .label { font-weight: 700; min-width: 60px; display: inline-block; }
  .section { margin-bottom: 14px; page-break-inside: avoid; }
  .section-title { font-family: "SimHei","黑体",sans-serif; font-size: 13px; font-weight: 700; border-bottom: 1.5px solid #1a1a1a; padding-bottom: 3px; margin-bottom: 8px; letter-spacing: 2px; }
  .entry { margin-bottom: 8px; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .entry-title { font-weight: 700; font-size: 11px; }
  .entry-sub { color: #555; font-size: 10.5px; }
  .entry-date { font-size: 10px; color: #666; white-space: nowrap; }
  .entry-bullets { font-size: 10.5px; color: #333; padding-left: 0; }
  .entry-bullets li { list-style: none; position: relative; padding-left: 14px; margin-bottom: 1px; }
  .entry-bullets li::before { content: "•"; position: absolute; left: 0; color: #333; }
  .tag { display: inline-block; background: #eee; padding: 1px 6px; border-radius: 2px; font-size: 10px; margin-right: 4px; margin-bottom: 3px; }
  .two-col { display: flex; gap: 28px; }
  .two-col > div { flex: 1; }
  .honor-item { font-size: 10.5px; margin-bottom: 2px; }
  .honor-item::before { content: "▸ "; }
  .footer-note { font-size: 10px; color: #888; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 12px; }
</style>
</head>
<body>
<!-- 
  曹静格式 · 中文简历模板
  结构：个人信息(照片) → 工作经历 → 项目经历 → 服役经历 → 教育背景 → 技能/荣誉 → 求职意向(末尾)
  替换所有 {{...}} 占位符
-->
<!-- ==================== 个人信息 ==================== -->
<div class="personal">
  <div class="photo">
    <img src="photo.jpg" alt="{{NAME}}" onerror="this.parentNode.innerHTML='[照片]'" />
  </div>
  <div class="info">
    <div class="name">{{NAME}}</div>
    <div class="row"><span class="label">年龄：</span>{{AGE}}</div>
    <div class="row"><span class="label">电话：</span>{{PHONE}}</div>
    <div class="row"><span class="label">邮箱：</span>{{EMAIL}}</div>
    <div class="row"><span class="label">城市：</span>{{CITY}}</div>
  </div>
</div>

<!-- ==================== 工作经历 ==================== -->
<div class="section">
  <div class="section-title">工作经历</div>
  {{WORK_EXPERIENCE}}
</div>

<!-- ==================== 项目经历 ==================== -->
<div class="section">
  <div class="section-title">项目经历</div>
  {{PROJECTS}}
</div>

<!-- ==================== 服役经历 ==================== -->
<div class="section">
  <div class="section-title">服役经历</div>
  {{MILITARY}}
</div>

<!-- ==================== 教育背景 ==================== -->
<div class="section">
  <div class="section-title">教育背景</div>
  {{EDUCATION}}
</div>

<!-- ==================== 技能证书 + 荣誉奖励 ==================== -->
<div class="two-col">
  <div class="section">
    <div class="section-title">技能证书</div>
    {{SKILLS}}
  </div>
  <div class="section">
    <div class="section-title">荣誉奖励</div>
    {{HONORS}}
  </div>
</div>

<!-- ==================== 求职意向（末尾） ==================== -->
<div class="footer-note">
  {{CAREER_OBJECTIVE}}
</div>

</body>
</html>
