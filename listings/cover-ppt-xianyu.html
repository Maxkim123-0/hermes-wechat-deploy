<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 800px; height: 800px; 
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'PingFang SC', 'Noto Sans CJK', sans-serif;
}
/* ── PPT Xianyu ── */
.card-ppt-xy { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #e0e0e0; }
.card-ppt-xy .accent { background: #e94560; }
.card-ppt-xy .title { font-size: 64px; font-weight: 900; margin: 30px 0 20px; }
.card-ppt-xy .sub { font-size: 24px; color: #ccc; margin-bottom: 40px; }
.card-ppt-xy .tag { font-size: 18px; color: #888; margin-top: 100px; }
.card-ppt-xy .line { width: 200px; height: 4px; background: #e94560; margin: 10px auto; }

/* ── PPT Xiaohongshu ── */
.card-ppt-xhs { background: #fff5f5; color: #333; }
.card-ppt-xhs .accent { background: #ff6b6b; }
.card-ppt-xhs .title { font-size: 56px; font-weight: 900; margin: 30px 0 20px; }
.card-ppt-xhs .sub { font-size: 26px; color: #666; margin-bottom: 40px; }
.card-ppt-xhs .tag { font-size: 18px; color: #aaa; margin-top: 100px; }
.card-ppt-xhs .line { width: 200px; height: 4px; background: #ff6b6b; margin: 10px auto; }

/* ── Hermes Xiaohongshu ── */
.card-hermes-xhs { background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); color: #00d4ff; }
.card-hermes-xhs .accent { background: #7b2ff7; }
.card-hermes-xhs .title { font-size: 56px; font-weight: 900; margin: 30px 0 15px; }
.card-hermes-xhs .sub { font-size: 22px; color: #88ccff; margin-bottom: 30px; line-height: 1.6; }
.card-hermes-xhs .tag { font-size: 18px; color: #666; margin-top: 100px; }
.card-hermes-xhs .line { width: 200px; height: 4px; background: #7b2ff7; margin: 10px auto; }

/* ── Hermes Xianyu ── */
.card-hermes-xy { background: #0a0a1a; color: #00ff88; }
.card-hermes-xy .accent { background: #00ff88; }
.card-hermes-xy .title { font-size: 58px; font-weight: 900; margin: 30px 0 20px; }
.card-hermes-xy .sub { font-size: 24px; color: #aaa; margin-bottom: 40px; }
.card-hermes-xy .tag { font-size: 18px; color: #555; margin-top: 100px; }
.card-hermes-xy .line { width: 200px; height: 4px; background: #00ff88; margin: 10px auto; }

/* 通用 */
.bar { width: 100%; height: 6px; }
.emoji { font-size: 72px; margin-bottom: 10px; }
.badges { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
.badge { 
  padding: 8px 20px; border-radius: 20px; font-size: 18px; 
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
}
.card-ppt-xhs .badge { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
</style>
</head>

<!-- ═══ 1. PPT闲鱼 ═══ -->
<body class="card-ppt-xy">
<div class="bar accent"></div>
<div class="emoji">📊</div>
<div class="title">PPT 代做</div>
<div class="sub">AI辅助 · 极速出稿 · 毕业答辩/述职/商业计划书</div>
<div class="badges">
  <span class="badge">⚡ 24h出稿</span>
  <span class="badge">🎨 不撞款</span>
  <span class="badge">🔄 包修改</span>
</div>
<div class="line"></div>
<div class="tag">HERMES AI · 你的智能助手</div>
</body>
</html>
