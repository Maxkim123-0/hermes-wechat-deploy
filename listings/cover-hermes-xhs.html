<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=800">
<style>*{margin:0;padding:0;box-sizing:border-box}body{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Noto Sans CJK',sans-serif;background:linear-gradient(135deg,#0f0f23,#1a1a3e);color:#00d4ff}

<div class="badges">

</body></html>
